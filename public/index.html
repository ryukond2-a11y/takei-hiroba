<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>たけい広場 - サッカー＆鬼ごっこ</title>
    <style>
        #announcer {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            font-size: 60px; font-weight: bold; color: #ffff00;
            text-shadow: 0 0 20px #000, 0 0 40px #ff0000; z-index: 1000; pointer-events: none;
            display: none; text-align: center; width: 100%;
        }
        body { margin: 0; overflow: hidden; background: #111; font-family: sans-serif; touch-action: none; color: white; }
        canvas { display: block; }
        #setup-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #111; display: flex; flex-direction: column;
            align-items: center; justify-content: center; z-index: 100;
        }
        #pixel-editor { display: grid; grid-template-columns: repeat(8, 30px); gap: 2px; margin: 20px 0; background: #333; padding: 5px; }
        .pixel { width: 30px; height: 30px; background: #555; cursor: pointer; }
        #ui { position: fixed; top: 10px; left: 10px; z-index: 10; pointer-events: none; }
        #status { background: rgba(0,0,0,0.5); padding: 5px 10px; border-radius: 5px; margin-bottom: 5px; display: inline-block; }
        #score-board { background: rgba(0,0,0,0.7); padding: 10px; border-radius: 8px; font-size: 14px; line-height: 1.6; display: none; }
        .timer-val { color: #ffff00; font-size: 18px; font-weight: bold; }
        .color-btn { width: 35px; height: 35px; border-radius: 50%; cursor: pointer; border: 2px solid #fff; margin: 0 5px; }
        #joy-base {
            position: fixed; bottom: 60px; right: 60px; width: 160px; height: 160px; 
            background: rgba(255,255,255,0.1); border: 3px solid rgba(255,255,255,0.3); 
            border-radius: 50%; display: none; z-index: 10;
        }
        #joy-stick { position: absolute; width: 70px; height: 70px; background: rgba(255,255,255,0.5); border-radius: 50%; top: 45px; left: 45px; }
        #btns { position: fixed; top: 10px; right: 10px; display: flex; flex-direction: column; gap: 10px; z-index: 20; }
        .game-btn {
            padding: 10px 20px; color: white; border: none; border-radius: 5px;
            font-weight: bold; display: none; pointer-events: auto; cursor: pointer;
        }
    </style>
</head>
<body>
<div id="announcer"></div>
<div id="setup-screen">
    <h2>アバターを作成して広場へ</h2>
    <input type="text" id="user-name" placeholder="なまえ" style="padding: 10px; width: 200px; margin-bottom: 10px;">
    <div id="pixel-editor"></div>
    <div style="display:flex; align-items:center; margin-bottom: 20px;">
        <div class="color-btn" style="background: #1d9bf0;" onclick="currentColor='#1d9bf0'"></div>
        <div class="color-btn" style="background: #ff4d4d;" onclick="currentColor='#ff4d4d'"></div>
        <span style="margin-left:15px;">自由な色:</span>
        <input type="color" id="color-picker" value="#1d9bf0" oninput="currentColor=this.value">
    </div>
    <button onclick="joinGame()" style="padding: 12px 30px; background: #1d9bf0; color: white; border: none; border-radius: 5px; font-weight: bold;">広場に入る！</button>
</div>

<canvas id="gameCanvas"></canvas>
<div id="ui">
    <div id="status"></div><br>
    <div id="score-board">
        TIME: <span id="timer-count" class="timer-val">0</span><br>
        <div id="oni-info">
            逃げ: <span id="nige-total" style="color:#1d9bf0">0</span>人 (凍: <span id="frozen-total">0</span>)<br>
            鬼: <span id="oni-total" style="color:#ff4d4d">0</span>人
        </div>
        <div id="soccer-info" style="display:none">
            BLUE <span id="score-blue" style="color:#1d9bf0">0</span> - <span id="score-white" style="color:#fff">0</span> WHITE
        </div>
    </div>
</div>

<div id="btns">
    <button id="oni-btn" class="game-btn" style="background: #ff4d4d;" onclick="socket.emit('start_onigokko')">鬼ごっこ開始！</button>
    <button id="soccer-btn" class="game-btn" style="background: #2e7d32;" onclick="socket.emit('start_soccer')">サッカー開始！</button>
</div>

<div id="joy-base"><div id="joy-stick"></div></div>

<script src="/socket.io/socket.io.js"></script>
<script>
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
function playWarpSound() {
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = 'exponential';
    osc.frequency.setValueAtTime(800, audioCtx.currentTime);
    osc.frequency.exponentialRampToValueAtTime(100, audioCtx.currentTime + 0.1);
    gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
    osc.connect(gain); gain.connect(audioCtx.destination);
    osc.start(); osc.stop(audioCtx.currentTime + 0.1);
}

const socket = io({ reconnection: true });
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");
let players = {}, myPos = { x: 750, y: 750 }, velocity = { x: 0, y: 0 }, scale = 1.0;
let isJoined = false, myAvatar = Array(64).fill("#555"), currentColor = "#1d9bf0";
let gameStatus = { isOnigokko: false, oniPages: [], frozenPages: [], timeLeft: 0 };
let ball = { x: 750, y: 2500 };
let soccerStatus = { isSoccer: false, score: { blue: 0, white: 0 }, timeLeft: 0, stats: {} };

const speed = 6;

// --- 通信受信 ---
socket.on('connect', () => {
    if (isJoined) {
        const name = document.getElementById("user-name").value.trim();
        socket.emit("join", { name, avatar: myAvatar, x: myPos.x, y: myPos.y });
    }
});
socket.on("update_all", (data) => { players = data; });
socket.on("onigokko_update", (data) => { gameStatus = data; });
socket.on("ball_update", (data) => { ball = data; });
socket.on("soccer_update", (data) => { soccerStatus = data; });
socket.on("announce", (msg) => {
    const el = document.getElementById("announcer");
    el.innerText = msg;
    el.style.display = "block";
    setTimeout(() => { el.style.display = "none"; }, 3000);
});

// --- 初期設定 ---
const editor = document.getElementById("pixel-editor");
for (let i = 0; i < 64; i++) {
    const div = document.createElement("div");
    div.className = "pixel";
    div.onclick = () => { div.style.background = currentColor; myAvatar[i] = currentColor; };
    editor.appendChild(div);
}

function joinGame() {
    const name = document.getElementById("user-name").value.trim();
    if (!name) return alert("なまえをいれてね");
    document.getElementById("setup-screen").style.display = "none";
    if (audioCtx.state === 'suspended') audioCtx.resume();
    isJoined = true;
    socket.emit("join", { name, avatar: myAvatar, x: myPos.x, y: myPos.y });
    document.getElementById("status").innerText = `広場: ${name}`;
    resize(); requestAnimationFrame(loop);
}

function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
window.addEventListener("resize", resize);

// --- ジョイスティック ---
if ("ontouchstart" in window) {
    const joyBase = document.getElementById("joy-base");
    const joyStick = document.getElementById("joy-stick");
    joyBase.style.display = "block";
    window.addEventListener("touchmove", (e) => {
        const rect = joyBase.getBoundingClientRect();
        const touch = e.touches[0];
        let dx = touch.clientX - (rect.left + 80), dy = touch.clientY - (rect.top + 80);
        const dist = Math.min(70, Math.sqrt(dx*dx + dy*dy));
        const angle = Math.atan2(dy, dx);
        velocity = { x: (Math.cos(angle)*dist/70)*speed, y: (Math.sin(angle)*dist/70)*speed };
        joyStick.style.transform = `translate(${Math.cos(angle)*dist}px, ${Math.sin(angle)*dist}px)`;
    }, { passive: false });
    window.addEventListener("touchend", () => { velocity = { x: 0, y: 0 }; joyStick.style.transform = `translate(0,0)`; });
}

// キーボード
const keys = {};
window.addEventListener("keydown", (e) => keys[e.key] = true);
window.addEventListener("keyup", (e) => keys[e.key] = false);

function loop() {
    if (!isJoined) return;
    const isFrozen = gameStatus.frozenPages.includes(socket.id);
    if (!isFrozen) {
        let nx = myPos.x + velocity.x, ny = myPos.y + velocity.y;
        if (keys["w"]) ny -= speed; if (keys["s"]) ny += speed;
        if (keys["a"]) nx -= speed; if (keys["d"]) nx += speed;
        
        // 移動範囲制限（広場、鬼ごっこ、サッカー）
        if (nx > -50 && nx < 6550) {
            // 広場エリア(0,0-1500) or サッカーエリア(0,2000-3000) or 鬼ごっこエリア(5000,5000-6500)
            if ((nx < 1550 && ny > -50 && ny < 1550) || 
                (nx < 1550 && ny > 2000 && ny < 3050) ||
                (nx > 4950 && nx < 6550 && ny > 4950 && ny < 6550)) {
                myPos.x = nx; myPos.y = ny;
            }
        }
        socket.emit("move", { x: myPos.x, y: myPos.y });
    }

    // 描画
    ctx.fillStyle = "#111"; ctx.fillRect(0, 0, canvas.width, canvas.height);
    ctx.save();
    ctx.translate(canvas.width/2, canvas.height/2); ctx.scale(scale, scale); ctx.translate(-myPos.x, -myPos.y);

    // 床
    const drawFloor = (x, y, color) => {
        ctx.fillStyle = color; ctx.fillRect(x, y, 1500, 1500);
        ctx.strokeStyle = "rgba(255,255,255,0.05)";
        for(let i=0; i<=1500; i+=50) { for(let j=0; j<=1500; j+=25) { ctx.strokeRect(x+i+(j%50==0?0:25), y+j, 50, 25); } }
    };
    drawFloor(0, 0, "#3e6b3e"); // 広場
    drawFloor(5000, 5000, "#3e6b3e"); // 鬼ごっこ

    // サッカー場
    ctx.fillStyle = "#2e7d32"; ctx.fillRect(50, 2050, 1400, 900);
    ctx.strokeStyle = "white"; ctx.lineWidth = 5;
    ctx.strokeRect(50, 2050, 1400, 900); // 外枠
    ctx.strokeRect(0, 2400, 50, 200);   // 左ゴール
    ctx.strokeRect(1450, 2400, 50, 200); // 右ゴール
    ctx.beginPath(); ctx.moveTo(750, 2050); ctx.lineTo(750, 2950); ctx.stroke(); // センターライン

    // ボール
    ctx.beginPath(); ctx.arc(ball.x, ball.y, 15, 0, Math.PI*2);
    ctx.fillStyle = "white"; ctx.fill(); ctx.strokeStyle = "black"; ctx.lineWidth = 2; ctx.stroke();

    // プレイヤー
    for (let id in players) {
        const p = players[id];
        const isOni = gameStatus.oniPages.includes(id), isF = gameStatus.frozenPages.includes(id);
        
        // 足元の輪っか
        ctx.beginPath(); ctx.arc(p.x, p.y + 15, 30, 0, Math.PI*2);
        ctx.strokeStyle = p.team === 'blue' ? '#1d9bf0' : '#ffffff';
        ctx.lineWidth = 3; ctx.stroke();

        ctx.save();
        if (isF) ctx.globalAlpha = 0.5;
        for (let i = 0; i < 64; i++) {
            if (p.avatar[i] === "#555") continue;
            ctx.fillStyle = isF ? "#ffffff" : p.avatar[i];
            ctx.fillRect(p.x - 20 + (i % 8) * 5, p.y - 20 + Math.floor(i / 8) * 5, 5, 5);
        }
        if (isOni) { ctx.strokeStyle = "#ff4d4d"; ctx.lineWidth = 3; ctx.beginPath(); ctx.arc(p.x, p.y, 30, 0, Math.PI*2); ctx.stroke(); }
        ctx.restore();

        // 名前と得点表示
        ctx.fillStyle = isOni ? "#ff4d4d" : "white"; ctx.font = "bold 16px sans-serif"; ctx.textAlign = "center";
        let displayName = p.name;
        // サッカー場エリアにいる時だけゴール数を表示
        if (p.y > 2000 && p.y < 3100 && soccerStatus.stats[id]) {
            displayName += ` (${soccerStatus.stats[id].goals}点)`;
        }
        ctx.fillText(displayName + (isF ? " (氷)" : ""), p.x, p.y - 35);
    }
    ctx.restore();

    // UI制御
    document.getElementById("score-board").style.display = (gameStatus.isOnigokko || soccerStatus.isSoccer) ? "block" : "none";
    document.getElementById("oni-info").style.display = gameStatus.isOnigokko ? "block" : "none";
    document.getElementById("soccer-info").style.display = soccerStatus.isSoccer ? "block" : "none";
    document.getElementById("timer-count").innerText = gameStatus.isOnigokko ? gameStatus.timeLeft : soccerStatus.timeLeft;
    if (soccerStatus.isSoccer) {
        document.getElementById("score-blue").innerText = soccerStatus.score.blue;
        document.getElementById("score-white").innerText = soccerStatus.score.white;
    }

    // ボタン表示制御
    document.getElementById("oni-btn").style.display = (myPos.x > 4500) ? "block" : "none";
    document.getElementById("soccer-btn").style.display = (myPos.y > 1800 && myPos.y < 3200) ? "block" : "none";

    requestAnimationFrame(loop);
}
</script>
</body>
</html>
