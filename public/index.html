<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>たけい広場</title>
    <style>
        body { margin: 0; overflow: hidden; background: #222; font-family: sans-serif; touch-action: none; color: white; }
        canvas { display: block; }
        #setup-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #111; display: flex; flex-direction: column;
            align-items: center; justify-content: center; z-index: 100;
        }
        #pixel-editor { display: grid; grid-template-columns: repeat(8, 30px); gap: 2px; margin: 20px 0; background: #333; padding: 5px; }
        .pixel { width: 30px; height: 30px; background: #555; cursor: pointer; }
        #ui { position: fixed; top: 10px; left: 10px; z-index: 10; pointer-events: none; }
        .color-btn { width: 35px; height: 35px; border-radius: 50%; cursor: pointer; border: 2px solid #fff; margin: 0 5px; }
        #joy-base {
            position: fixed; bottom: 40px; left: 40px; width: 100px; height: 100px;
            background: rgba(255,255,255,0.1); border: 2px solid rgba(255,255,255,0.3);
            border-radius: 50%; display: none; z-index: 10;
        }
        #joy-stick { position: absolute; width: 40px; height: 40px; background: rgba(255,255,255,0.5); border-radius: 50%; top: 30px; left: 30px; }
    </style>
</head>
<body>

<div id="setup-screen">
    <h2 style="margin-bottom:10px;">アバターを作成して広場へ</h2>
    <input type="text" id="user-name" placeholder="なまえ" style="padding: 10px; width: 200px; margin-bottom: 10px;">
    
    <div id="pixel-editor"></div>

    <div style="display:flex; margin-bottom: 20px;">
        <div class="color-btn" style="background: #1d9bf0;" onclick="currentColor='#1d9bf0'"></div>
        <div class="color-btn" style="background: #ff4d4d;" onclick="currentColor='#ff4d4d'"></div>
        <div class="color-btn" style="background: #44ff44;" onclick="currentColor='#44ff44'"></div>
        <div class="color-btn" style="background: #ffffff;" onclick="currentColor='#ffffff'"></div>
        <div class="color-btn" style="background: #555555;" onclick="currentColor='#555555'"></div> </div>
    
    <button onclick="joinGame()" style="padding: 12px 30px; background: #1d9bf0; color: white; border: none; border-radius: 5px; font-weight: bold;">広場に入る！</button>
</div>

<canvas id="gameCanvas"></canvas>
<div id="ui"><div id="status"></div></div>
<div id="joy-base"><div id="joy-stick"></div></div>

<script src="/socket.io/socket.io.js"></script>
<script>
const socket = io();
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");

let players = {};
let myPos = { x: 500, y: 500 }; 
let velocity = { x: 0, y: 0 };
const speed = 5;
let isJoined = false;

// ドット絵データ初期化
let myAvatar = Array(64).fill("#555");
let currentColor = "#1d9bf0";

// エディタ生成
const editor = document.getElementById("pixel-editor");
for (let i = 0; i < 64; i++) {
    const div = document.createElement("div");
    div.className = "pixel";
    div.onclick = () => { div.style.background = currentColor; myAvatar[i] = currentColor; };
    editor.appendChild(div);
}

function joinGame() {
    const name = document.getElementById("user-name").value.trim();
    if (!name) return alert("なまえをいれてね");
    
    document.getElementById("setup-screen").style.display = "none";
    isJoined = true;
    
    socket.emit("join", { name: name, avatar: myAvatar });
    document.getElementById("status").innerText = `広場: ${name}`;
    
    resize();
    requestAnimationFrame(loop);
}

function resize() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
}
window.addEventListener("resize", resize);

socket.on("update_all", (data) => { players = data; });
socket.on("player_moved", (p) => { if(players[p.id]) { players[p.id].x = p.x; players[p.id].y = p.y; } });
socket.on("player_left", (id) => { delete players[id]; });

// 操作系
const keys = {};
window.addEventListener("keydown", (e) => keys[e.key] = true);
window.addEventListener("keyup", (e) => keys[e.key] = false);

// スマホジョイスティック（簡易版）
if ("ontouchstart" in window) {
    document.getElementById("joy-base").style.display = "block";
    window.addEventListener("touchmove", (e) => {
        const touch = e.touches[0];
        const rect = document.getElementById("joy-base").getBoundingClientRect();
        const centerX = rect.left + 50;
        const centerY = rect.top + 50;
        velocity.x = (touch.clientX - centerX) / 10;
        velocity.y = (touch.clientY - centerY) / 10;
        // 速度制限
        velocity.x = Math.max(-speed, Math.min(speed, velocity.x));
        velocity.y = Math.max(-speed, Math.min(speed, velocity.y));
    });
    window.addEventListener("touchend", () => { velocity = {x:0, y:0}; });
}

function loop() {
    if (!isJoined) return;

    // 移動計算
    if (keys["ArrowUp"] || keys["w"]) myPos.y -= speed;
    if (keys["ArrowDown"] || keys["s"]) myPos.y += speed;
    if (keys["ArrowLeft"] || keys["a"]) myPos.x -= speed;
    if (keys["ArrowRight"] || keys["d"]) myPos.x += speed;
    
    myPos.x += velocity.x;
    myPos.y += velocity.y;

    if (velocity.x !== 0 || velocity.y !== 0 || keys["ArrowUp"] || keys["w"] || keys["ArrowDown"] || keys["s"] || keys["ArrowLeft"] || keys["a"] || keys["ArrowRight"] || keys["d"]) {
        socket.emit("move", { x: myPos.x, y: myPos.y });
    }

    ctx.clearRect(0, 0, canvas.width, canvas.height);

    // カメラ
    const camX = canvas.width / 2 - myPos.x;
    const camY = canvas.height / 2 - myPos.y;
    ctx.save();
    ctx.translate(camX, camY);

    // 地面（グリッドを描画して動いている感を出す）
    ctx.strokeStyle = "#444";
    for(let i=0; i<2000; i+=100) {
        ctx.beginPath(); ctx.moveTo(i, 0); ctx.lineTo(i, 2000); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(0, i); ctx.lineTo(2000, i); ctx.stroke();
    }

    // 全員描画
    for (let id in players) {
        const p = players[id];
        const isMe = (id === socket.id);
        const x = isMe ? myPos.x : p.x;
        const y = isMe ? myPos.y : p.y;

        if (p.avatar) {
            // ドット絵描画
            for (let i = 0; i < 64; i++) {
                if (p.avatar[i] === "#555555" || p.avatar[i] === "#555") continue;
                ctx.fillStyle = p.avatar[i];
                ctx.fillRect(x - 20 + (i % 8) * 5, y - 20 + Math.floor(i / 8) * 5, 5, 5);
            }
        }
        ctx.fillStyle = "white";
        ctx.font = "12px sans-serif";
        ctx.textAlign = "center";
        ctx.fillText(p.name, x, y - 30);
    }

    ctx.restore();
    requestAnimationFrame(loop);
}
</script>
</body>
</html>
