<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>たけい広場</title>
<style>
body { margin:0; overflow:hidden; background:#222; }
.player {
  position:absolute;
  width:20px;
  height:20px;
  background:#4af;
}
.name {
  position:absolute;
  font-size:12px;
  color:#fff;
  transform:translate(-10px,-15px);
}
</style>
</head>
<body>

<script>
const ws = new WebSocket(location.origin.replace("http","ws"));

let myId;
let players = {};
let my = { x: 5, y: 5 };

const name = prompt("名前入力") || "名無し";

ws.onopen = () => {
    ws.send(JSON.stringify({ type: "name", name }));
};

ws.onmessage = (msg) => {
    const data = JSON.parse(msg.data);

    if (data.type === "init") {
        myId = data.id;
        players = data.players;
    }

    if (data.type === "update") {
        players = data.players;
        draw();
    }
};
document.addEventListener("click", e => {
    const x = Math.floor(e.clientX / 20);
    const y = Math.floor(e.clientY / 20);

    my.x = x;
    my.y = y;

    ws.send(JSON.stringify({
        type: "move",
        x: my.x,
        y: my.y
    }));
});
document.addEventListener("keydown", e => {
   if (e.key === "w" || e.key === "ArrowUp") my.y--;
if (e.key === "s" || e.key === "ArrowDown") my.y++;
if (e.key === "a" || e.key === "ArrowLeft") my.x--;
if (e.key === "d" || e.key === "ArrowRight") my.x++;

    ws.send(JSON.stringify({
        type: "move",
        x: my.x,
        y: my.y
    }));
});

function draw() {
    document.body.innerHTML = "";

    for (let id in players) {
        const p = players[id];

        const el = document.createElement("div");
        el.className = "player";
        el.style.left = p.x * 20 + "px";
        el.style.top = p.y * 20 + "px";

        const nameEl = document.createElement("div");
        nameEl.className = "name";
        nameEl.innerText = p.name;
        nameEl.style.left = p.x * 20 + "px";
        nameEl.style.top = p.y * 20 + "px";

        document.body.appendChild(el);
        document.body.appendChild(nameEl);
    }
}
</script>

</body>
</html>
