<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>たけい広場 - 鬼ごっこ完全版</title>
    <style>
        /* 中央のお知らせ表示 */
#announcer {
    position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
    font-size: 48px; font-weight: bold; color: #ff4d4d;
    text-shadow: 0 0 20px #000; z-index: 1000; pointer-events: none;
    display: none;
}
        body { margin: 0; overflow: hidden; background: #111; font-family: sans-serif; touch-action: none; color: white; }
        canvas { display: block; }
        #setup-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #111; display: flex; flex-direction: column;
            align-items: center; justify-content: center; z-index: 100;
        }
        #pixel-editor { display: grid; grid-template-columns: repeat(8, 30px); gap: 2px; margin: 20px 0; background: #333; padding: 5px; }
        .pixel { width: 30px; height: 30px; background: #555; cursor: pointer; }
        #ui { position: fixed; top: 10px; left: 10px; z-index: 10; pointer-events: none; }
        #status { background: rgba(0,0,0,0.5); padding: 5px 10px; border-radius: 5px; margin-bottom: 5px; display: inline-block; }
        #score-board { background: rgba(0,0,0,0.7); padding: 10px; border-radius: 8px; font-size: 14px; line-height: 1.6; display: none; }
        .oni-count { color: #ff4d4d; font-weight: bold; }
        .nige-count { color: #1d9bf0; font-weight: bold; }
        .timer-val { color: #ffff00; font-size: 18px; font-weight: bold; }
        .color-btn { width: 35px; height: 35px; border-radius: 50%; cursor: pointer; border: 2px solid #fff; margin: 0 5px; }
        #joy-base {
            position: fixed; bottom: 60px; right: 60px; width: 160px; height: 160px; 
            background: rgba(255,255,255,0.1); border: 3px solid rgba(255,255,255,0.3); 
            border-radius: 50%; display: none; z-index: 10;
        }
        #joy-stick { position: absolute; width: 70px; height: 70px; background: rgba(255,255,255,0.5); border-radius: 50%; top: 45px; left: 45px; }
        #game-btn {
            position: fixed; top: 10px; right: 10px; padding: 10px 20px;
            background: #ff4d4d; color: white; border: none; border-radius: 5px;
            font-weight: bold; display: none; z-index: 20; pointer-events: auto;
        }

/* 「チャット」ボタンの設定 */
#chat-btn {
    position: fixed;
    top: 10px;
    right: 160px; /* 鬼ごっこボタンの左側に置く（重ならないように） */
    padding: 10px 20px;
    background: #1d9bf0;
    color: white;
    border: none;
    border-radius: 5px;
    font-weight: bold;
    display: block; /* 常に表示 */
    z-index: 20;
    pointer-events: auto;
    cursor: pointer;
}

/* チャットボタンだけ少し左にずらす（重なり防止） */
#chat-btn {
    right: 150px; /* 鬼ごっこボタンの左側に配置 */
}
    </style>
</head>
<body>
<div id="announcer"></div>
<div id="setup-screen">
    <h2>アバターを作成して広場へ</h2>
    <input type="text" id="user-name" placeholder="なまえ" style="padding: 10px; width: 200px; margin-bottom: 10px;">
    <div id="pixel-editor"></div>
    <div style="display:flex; align-items:center; margin-bottom: 20px;">
    <div class="color-btn" style="background: #1d9bf0;" onclick="currentColor='#1d9bf0'"></div>
    <div class="color-btn" style="background: #ff4d4d;" onclick="currentColor='#ff4d4d'"></div>
    
    <span style="margin-left:15px; margin-right:5px;">自由な色:</span>
    <input type="color" id="color-picker" value="#1d9bf0" 
           oninput="currentColor=this.value" 
           style="width:50px; height:40px; cursor:pointer;">
</div>
    <button onclick="joinGame()" style="padding: 12px 30px; background: #1d9bf0; color: white; border: none; border-radius: 5px; font-weight: bold;">広場に入る！</button>
</div>

<canvas id="gameCanvas"></canvas>
<div id="ui">
    <div id="status"></div><br>
    <div id="score-board">
        TIME: <span id="timer-count" class="timer-val">0</span><br>
        逃げ: <span id="nige-total" class="nige-count">0</span>人 (凍: <span id="frozen-total">0</span>)<br>
        鬼: <span id="oni-total" class="oni-count">0</span>人
    </div>
</div>
<button id="chat-btn" class="game-btn" onclick="openChat()">チャット</button>
<button id="game-btn" class="game-btn" style="background: #ff4d4d; display: none;" onclick="startGame()">鬼ごっこ開始！</button>
<div id="joy-base"><div id="joy-stick"></div></div>

<script src="/socket.io/socket.io.js"></script>
<script>
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
function playWarpSound() {
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = 'exponential';
    osc.frequency.setValueAtTime(800, audioCtx.currentTime);
    osc.frequency.exponentialRampToValueAtTime(100, audioCtx.currentTime + 0.1);
    gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
    osc.connect(gain); gain.connect(audioCtx.destination);
    osc.start(); osc.stop(audioCtx.currentTime + 0.1);
}


const socket = io({
    reconnection: true,
    reconnectionAttempts: Infinity,
    reconnectionDelay: 1000
});
let currentWallOffset = 0; // サーバーから受け取る用
socket.on('wall_update', (offset) => {
    currentWallOffset = offset;
});
// ★このブロックを新しく追加（socketのすぐ下でOK）
socket.on('connect', () => {
    if (isJoined) {
        const name = document.getElementById("user-name").value.trim();
        // サーバーがリセットされても、今の座標(myPos)とアバターを送り直して復帰する
        socket.emit("join", { 
            name: name, 
            avatar: myAvatar,
            x: myPos.x,
            y: myPos.y 
        });
    }
});
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");
let players = {}, myPos = { x: 750, y: 750 }, velocity = { x: 0, y: 0 }, scale = 1.0;
const speed = 6, worldSize = 1500;
let isJoined = false, myAvatar = Array(64).fill("#555"), currentColor = "#1d9bf0";
let gameStatus = { isOnigokko: false, oniPages: [], frozenPages: [], timeLeft: 0 };

// --- 初期設定・アバター ---
window.onload = () => {
    const saved = localStorage.getItem("neda_lab_user");
    if (saved) {
        const data = JSON.parse(saved);
        document.getElementById("user-name").value = data.name;
        myAvatar = data.avatar;
        updateEditor();
    }
};
function updateEditor() {
    const pixels = document.querySelectorAll(".pixel");
    myAvatar.forEach((color, i) => { if(pixels[i]) pixels[i].style.background = color; });
}
function openChat() {
    const msg = prompt("みんなにメッセージを送る:");
    if (msg && msg.trim() !== "") {
        socket.emit("send_chat", msg);
    }
}
const editor = document.getElementById("pixel-editor");
for (let i = 0; i < 64; i++) {
    const div = document.createElement("div");
    div.className = "pixel";
    div.onclick = () => { div.style.background = currentColor; myAvatar[i] = currentColor; };
    editor.appendChild(div);
}

// ★ここを書き換え
function joinGame() {
    const name = document.getElementById("user-name").value.trim();
    if (!name) return alert("なまえをいれてね");
    localStorage.setItem("neda_lab_user", JSON.stringify({ name, avatar: myAvatar }));
    document.getElementById("setup-screen").style.display = "none";
    if (audioCtx.state === 'suspended') audioCtx.resume();
    
    isJoined = true;
    
    // ★ここ！ `{ name, avatar: myAvatar }` だったところに `x, y` を追加
    socket.emit("join", { 
        name: name, 
        avatar: myAvatar, 
        x: myPos.x, 
        y: myPos.y 
    });
    
    document.getElementById("status").innerText = `広場: ${name}`;
    resize(); requestAnimationFrame(loop);
}
function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
window.addEventListener("resize", resize);
let soccerData = { ball: {x:750, y:750}, scores: {red:0, blue:0}, timer: 150 };
socket.on('soccer_update', (data) => { soccerData = data; });

// --- タップ・ズーム ---
let startDist = 0;
window.addEventListener("touchstart", (e) => {
    if (e.touches.length === 2) startDist = Math.hypot(e.touches[0].pageX - e.touches[1].pageX, e.touches[0].pageY - e.touches[1].pageY);
});
window.addEventListener("touchmove", (e) => {
    if (e.touches.length === 2) {
        const dist = Math.hypot(e.touches[0].pageX - e.touches[1].pageX, e.touches[0].pageY - e.touches[1].pageY);
        scale = Math.max(0.7, Math.min(2.0, scale * (dist / startDist)));
        startDist = dist;
    }
}, { passive: false });

window.addEventListener("click", (e) => {
    if (!isJoined) return;
    const rect = canvas.getBoundingClientRect();
    const mx = (e.clientX - rect.left - canvas.width/2) / scale + myPos.x;
    const my = (e.clientY - rect.top - canvas.height/2) / scale + myPos.y;
    if (mx > 1480 && mx < 1510 && my > 700 && my < 800) { playWarpSound(); myPos.x = 5100; myPos.y = 5750; }
    if (mx > 5000 && mx < 5030 && my > 5700 && my < 5800) { playWarpSound(); myPos.x = 750; myPos.y = 750; }
});

// --- 通信 ---
socket.on("update_all", (data) => { players = data; updateScoreBoard(); });
socket.on("player_moved", (p) => { if(players[p.id]) { players[p.id].x = p.x; players[p.id].y = p.y; } });
socket.on("onigokko_update", (data) => { gameStatus = data; updateScoreBoard(); });
// --- アナウンス演出の受信 ---
socket.on("announce", (msg) => {
    const el = document.getElementById("announcer");
    el.innerText = msg;
    el.style.display = "block";
    
    // 2秒後に消す（「終了！」の時は少し長めに見せる）
    setTimeout(() => {
        el.style.display = "none";
    }, 2000);
});

// loop関数の修正は不要（gameStatus.isOnigokkoがfalseになれば自動で見た目が戻るよ！）
const keys = {};
window.addEventListener("keydown", (e) => keys[e.key] = true);
window.addEventListener("keyup", (e) => keys[e.key] = false);

// ジョイスティック
if ("ontouchstart" in window) {
    const joyBase = document.getElementById("joy-base");
    const joyStick = document.getElementById("joy-stick");
    joyBase.style.display = "block";
    window.addEventListener("touchmove", (e) => {
        const rect = joyBase.getBoundingClientRect();
        const centerX = rect.left + 160/2, centerY = rect.top + 160/2;
        const touch = e.touches[0];
        let dx = touch.clientX - centerX, dy = touch.clientY - centerY;
        const dist = Math.min(70, Math.sqrt(dx*dx + dy*dy));
        const angle = Math.atan2(dy, dx);
        const mx = Math.cos(angle) * dist, my = Math.sin(angle) * dist;
        joyStick.style.transform = `translate(${mx}px, ${my}px)`;
        velocity = { x: (mx/70)*speed, y: (my/70)*speed };
    }, { passive: false });
    window.addEventListener("touchend", () => { joyStick.style.transform = `translate(0,0)`; velocity = { x:0, y:0 }; });
}

function updateScoreBoard() {
    if (!gameStatus.isOnigokko) { document.getElementById("score-board").style.display = "none"; return; }
    document.getElementById("score-board").style.display = "block";
    document.getElementById("timer-count").innerText = gameStatus.timeLeft;
    const total = Object.keys(players).length, oni = gameStatus.oniPages.length, frozen = gameStatus.frozenPages.length;
    document.getElementById("nige-total").innerText = total - oni;
    document.getElementById("frozen-total").innerText = frozen;
    document.getElementById("oni-total").innerText = oni;
}

function loop() {
    if (!isJoined) return;
    const isFrozen = gameStatus.frozenPages.includes(socket.id);
    // --- 追加：サッカー場へのワープ（広場の下端 1450付近） ---
if (myPos.x > 600 && myPos.x < 900 && myPos.y > 1450 && myPos.y < 1500) {
    playWarpSound();
    myPos.x = 750; myPos.y = 100; // サッカー場の北側（上の方）にスポーン
    socket.emit("announce", `${players[socket.id].name}がサッカー場に入場！`);
}

// 逆にサッカー場から戻る判定（サッカー場の下端から広場へ）
if (myPos.x > 600 && myPos.x < 900 && myPos.y > 1450 && myPos.y < 1500 && myPos.x < 1500) {
    // サッカー場にいる時だけ判定
    playWarpSound();
    myPos.x = 750; myPos.y = 1350; // 広場の下の方に戻る
}

    if (!isFrozen) {
        let nx = myPos.x + (velocity.x || 0), ny = myPos.y + (velocity.y || 0);
        if (keys["w"]) ny -= speed; if (keys["s"]) ny += speed;
        if (keys["a"]) nx -= speed; if (keys["d"]) nx += speed;

        // --- 動く壁との当たり判定（移動を確定させる前にチェック） ---
        const walls = [
            { x: 5500 + (window.currentWallOffset || 0), y: 5300, w: 400, h: 40 }, 
            { x: 5800, y: 5200 + ((window.currentWallOffset || 0) * 0.8), w: 40, h: 400 }
        ];

        let canMove = true;
        walls.forEach(w => {
            // 自分のサイズ(20px程度)を考慮した判定
            if (nx + 15 > w.x && nx - 15 < w.x + w.w &&
                ny + 15 > w.y && ny - 15 < w.y + w.h) {
                canMove = false; 
            }
        });

        // 壁にぶつかっていない場合のみ、座標を更新
        if (canMove && nx > 30 && nx < 6500) {
            if ((nx < 1500 && ny > 0 && ny < 1500) || (nx > 5000 && nx < 6500 && ny > 5000 && ny < 6500)) {
                myPos.x = nx; myPos.y = ny;
            }
        }
        socket.emit("move", { x: myPos.x, y: myPos.y });
// --- 追加：ボールを蹴る判定 (サッカー場 0~1500 エリアにいる時のみ) ---
if (myPos.x < 1500 && myPos.y < 1500) {
    // サーバーから送られてくるボールの座標(soccerData.ball)との距離を測る
    const dx = myPos.x - soccerData.ball.x;
    const dy = myPos.y - soccerData.ball.y;
    const distance = Math.sqrt(dx * dx + dy * dy);

    if (distance < 35) { // プレイヤーとボールが接触（半径の合計くらい）
        // 自分の動いている方向にボールを飛ばす
        socket.emit('kick_ball', {
            vx: (keys["a"] ? -12 : keys["d"] ? 12 : 0),
            vy: (keys["w"] ? -12 : keys["s"] ? 12 : 0)
        });
    }
}

// --- 追加：ボールの描画 ---
// 芝生を描いた後、プレイヤーを描く前に入れるのがベスト
ctx.fillStyle = "white";
ctx.strokeStyle = "black";
ctx.lineWidth = 2;
ctx.beginPath();
ctx.arc(soccerData.ball.x, soccerData.ball.y, 15, 0, Math.PI * 2); // 半径15の円
ctx.fill();
ctx.stroke();
// --- 追加：UI（スコア・タイマー）の表示 ---
ctx.save();
ctx.setTransform(1, 0, 0, 1, 0, 0); // カメラの影響を受けないようにリセット

ctx.fillStyle = "rgba(0, 0, 0, 0.6)";
ctx.fillRect(canvas.width / 2 - 160, 10, 320, 50); // 黒い背景枠

ctx.fillStyle = "white";
ctx.font = "bold 22px sans-serif";
ctx.textAlign = "center";
ctx.fillText(
    `赤 ${soccerData.scores.red} - ${soccerData.scores.blue} 青 | 残り ${soccerData.timer}秒`, 
    canvas.width / 2, 42
);

ctx.restore();

        // 行き（右側へ）
        if (myPos.x > 1470 && myPos.x < 1510 && myPos.y > 700 && myPos.y < 800) {
            playWarpSound();
            myPos.x = 5100; myPos.y = 5750;
        }
        // 戻り（左側へ）
        if (myPos.x > 4990 && myPos.x < 5030 && myPos.y > 5700 && myPos.y < 5800) {
            playWarpSound();
            myPos.x = 750; myPos.y = 750;
        }
    }

    ctx.fillStyle = "#111"; ctx.fillRect(0, 0, canvas.width, canvas.height);
    ctx.save();
    ctx.translate(canvas.width/2, canvas.height/2); ctx.scale(scale, scale); ctx.translate(-myPos.x, -myPos.y);

    // 床描画
    const drawFloor = (x, y) => {
        ctx.fillStyle = "#3e6b3e"; ctx.fillRect(x, y, 1500, 1500);
        ctx.strokeStyle = "rgba(255,255,255,0.05)";
        for(let i=0; i<=1500; i+=50) { for(let j=0; j<=1500; j+=25) { ctx.strokeRect(x+i+(j%50==0?0:25), y+j, 50, 25); } }
    };
    drawFloor(0, 0); drawFloor(5000, 5000);
    ctx.fillStyle = "#ff4d4d"; ctx.fillRect(1480, 700, 20, 100); // 行き
    ctx.fillStyle = "#4da6ff"; ctx.fillRect(5000, 5700, 20, 100); // 戻り
// loop内の drawFloor(0, 0); のすぐ下あたりに追加
if (myPos.x < 1500 && myPos.y < 1500) {
    // 広場の下側に黄色いライン（入り口）を引く
    ctx.fillStyle = "yellow";
    ctx.fillRect(600, 1480, 300, 20);
    ctx.fillStyle = "white";
    ctx.font = "bold 20px sans-serif";
    ctx.fillText("サッカー場 (下へ)", 750, 1460);
}

    // --- 同期された壁を実際に描画 ---
    const drawWalls = [
        { x: 5500 + (window.currentWallOffset || 0), y: 5300, w: 400, h: 40 },
        { x: 5800, y: 5200 + ((window.currentWallOffset || 0) * 0.8), w: 40, h: 400 }
    ];
    ctx.fillStyle = "#ffcc00"; // 警告色っぽく
    drawWalls.forEach(w => ctx.fillRect(w.x, w.y, w.w, w.h));

    for (let id in players) {
        const p = players[id], x = (id === socket.id) ? myPos.x : p.x, y = (id === socket.id) ? myPos.y : p.y;
        const isOni = gameStatus.oniPages.includes(id), isF = gameStatus.frozenPages.includes(id);
        ctx.save();
        if (isF) ctx.globalAlpha = 0.5;
        for (let i = 0; i < 64; i++) {
            if (p.avatar[i] === "#555") continue;
            ctx.fillStyle = isF ? "#ffffff" : p.avatar[i];
            ctx.fillRect(x - 20 + (i % 8) * 5, y - 20 + Math.floor(i / 8) * 5, 5, 5);
        }
        if (isOni) { ctx.strokeStyle = "#ff4d4d"; ctx.lineWidth = 3; ctx.beginPath(); ctx.arc(x, y, 30, 0, Math.PI*2); ctx.stroke(); }
        ctx.restore();
        ctx.fillStyle = isOni ? "#ff4d4d" : "white"; ctx.font = "bold 16px sans-serif"; ctx.textAlign = "center";
        ctx.fillText(p.name + (isF ? " (氷)" : ""), x, y - 35);
    }
    ctx.restore();
    document.getElementById("game-btn").style.display = (myPos.x > 5000) ? "block" : "none";
    requestAnimationFrame(loop);
}

function startGame() { socket.emit("start_onigokko"); }
</script>
</body>
</html>
